name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea and the workflow problem it solves.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What workflow friction or limitation does this address?
      placeholder: "When working on [X], I have to manually [Y] which breaks my flow because..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the ideal behavior or UI you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternative approaches you've tried.

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Which part of ResolveLink does this relate to?
      options:
        - DaVinci Resolve Integration (clips, timeline, import)
        - After Effects Extension (CEP panel, JSX scripts)
        - REAPER Integration (panel, callback, Lua scripts)
        - Bridge Server (API, WebSocket, file watcher)
        - Electron App (UI, setup, project browser)
        - New Integration (Fusion, Nuke, Blender, etc.)
        - Installation / Setup
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      description: What kind of feature is this?
      options:
        - Workflow improvement (faster, fewer steps)
        - New capability (thing that doesn't exist yet)
        - Compatibility (support for new host version/OS)
        - Reliability (error handling, retry, logging)
        - UI/UX (interface, feedback, status)
    validations:
      required: true

  - type: textarea
    id: workflow
    attributes:
      label: Current Workflow
      description: Describe what you're doing now to work around this limitation.

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, mockups, references to similar features in other tools, or links to related issues.
