name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the information below so we can reproduce and fix it.

  - type: input
    id: version
    attributes:
      label: ResolveLink Version
      description: Found in the Electron app title bar or `package.json`.
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Where does the bug occur?
      options:
        - DaVinci Resolve (send clips, re-import, scripts)
        - After Effects (CEP Extension, render, import)
        - REAPER (Panel, Callback, Send to Resolve, Update Project)
        - Bridge Server (API errors, WebSocket, file watcher)
        - Electron App (UI, status, setup wizard)
        - Installation / Setup
    validations:
      required: true

  - type: input
    id: host-version
    attributes:
      label: Host Application Version
      description: Version of the affected host application.
      placeholder: "Resolve Studio 21.0 / AE 25.2 / REAPER 7.30"

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: Output of `node --version`.
      placeholder: "v20.11.0"

  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: Output of `python --version`. Only needed if the bug involves Resolve scripting.
      placeholder: "3.11.4"

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: How did you install ResolveLink?
      options:
        - install.lua (Resolve Console)
        - install.ps1 / install.sh (manual)
        - ReaPack (REAPER scripts only)
        - Built from source
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what went wrong.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps to trigger the bug.
      value: |
        1. Open DaVinci Resolve and select clips on the timeline
        2. Click "Send to After Effects" / "Send to REAPER"
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Server / Console Logs
      description: |
        Paste relevant log output. Check these locations:
        - Bridge Server terminal output
        - Electron DevTools console (Ctrl+Shift+I)
        - REAPER Script Console (Options > Show console)
        - After Effects ExtendScript Toolkit or `~/Documents/Logs`
      render: shell

  - type: textarea
    id: env
    attributes:
      label: Relevant .env Configuration
      description: Paste your `.env` file (redact any sensitive values).
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, file paths, or anything else that helps explain the issue.
