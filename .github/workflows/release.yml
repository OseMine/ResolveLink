name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Inject version into installer
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          sed "s|__RELEASE_TAG__|${VERSION}|g" install.lua > install-release.lua
          echo "Installer patched for ${VERSION}"

      - name: Generate release notes with OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode/big-pickle
          prompt: |
            Generate a changelog for ResolveLink ${{ steps.tag.outputs.version }}.
            Look at the git log since the previous tag to understand what changed.
            Write ONLY the changelog to CHANGELOG.md.

            Style rules (match the existing release notes):
            - Group under ### Bug Fixes and ### Improvements (add other ### sections if relevant)
            - Each bullet: - **Area**: Short description of what changed
            - Area examples: AE workflow, REAPER workflow, REAPER scripts, Setup, Panel, Server, Electron UI
            - Concise, technical but user-facing, no fluff, no "we" language
            - No code fences around the output

      - name: Assemble release notes
        run: |
          cat CHANGELOG.md > RELEASE_BODY.md
          echo "" >> RELEASE_BODY.md
          cat RELEASE-BODY.md >> RELEASE_BODY.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ResolveLink ${{ steps.tag.outputs.version }}"
          body_path: RELEASE_BODY.md
          files: install-release.lua
          draft: false
          prerelease: false
